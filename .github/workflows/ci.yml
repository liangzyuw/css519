name: CI Pipeline

on:
  push:
    branches:
      - main
      - work
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      JWT_SECRET: test_secret_for_ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # just a debugging/convenience step, can be useful when troubleshooting CI failures
      # - name: Show Docker versions
      #   run: |
      #     docker --version
      #     docker compose version

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run backend unit tests
        working-directory: backend
        run: npm test

      - name: Build containers
        run: docker compose build

      - name: Start containers
        run: docker compose up -d
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend..."
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Backend not ready yet..."
            sleep 2
          done

          echo "Backend failed to start"
          docker compose logs
          exit 1

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run security API tests
        run: bash backend/tests/security_tests.sh

      - name: Run functional API tests
        run: bash backend/tests/functional_tests.sh

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop containers
        if: always()
        run: docker compose down